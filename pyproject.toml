[project]
name = "music-discovery-engine"
version = "0.1.0"
requires-python = ">=3.14"
dependencies = [
    "alembic",
    "fastapi",
    "httpx",
    "psycopg[binary]",
    "pydantic",
    "pydantic-settings",
    "python-dotenv",
    "sqlalchemy",
    "uvicorn",
]

[dependency-groups]
dev = [
    "pyright[nodejs]",
    "pytest",
    "ruff",
]
